<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sunny Trails Planner helps you search U.S. national parks, view alerts and 7-day weather forecasts, and save trip itineraries in one place."
    />
    <meta name="author" content="Parker Jones" />
    <title>Sunny Trails Planner</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="hero-content">
        <p class="eyebrow">National Parks Trip Planner</p>
        <h1>Sunny Trails Planner</h1>
        <p class="tagline">Discover parks, check weather, and keep your trip plans in one clean place.</p>
      </div>
    </header>
    <main>
      <section class="card" id="search">Search tools and park results will show up here.</section>
      <section class="card" id="details">Park details, weather, and alerts will show up here.</section>
      <section class="card" id="itinerary">Your trip form and saved itineraries will show up here.</section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
