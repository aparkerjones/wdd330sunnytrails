name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./sunny-trails
      
      - name: Build
        run: npm run build
        working-directory: ./sunny-trails
        env:
          VITE_NPS_API_KEY: ${{ secrets.VITE_NPS_API_KEY }}
          VITE_NPS_BASE_URL: https://developer.nps.gov/api/v1
          VITE_OPEN_METEO_BASE_URL: https://api.open-meteo.com/v1
          VITE_DEFAULT_LAT: '40.7128'
          VITE_DEFAULT_LON: '-74.0060'
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./sunny-trails/dist
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
